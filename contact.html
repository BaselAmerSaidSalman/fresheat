<!DOCTYPE html>
    <html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Contact Us</title>
    </head>
    <body>
        <div class="contact_page_content">
            <a href="index.html" class="contact_page_cross"> &lt;-- </a>
            <h1 class="contact_h1">Contact Us</h1>
            <form>
                <div class="contact_first_name">
                    <label class="user_first_name_label">First Name</label>
                    <input type="text" class="user_first_name" name="user_first_name" required/>
                </div>
                <div class="contact_last_name">
                    <label class="user_last_name_label">Last Name</label>
                    <input type="text" class="user_last_name" name="user_last_name" required/>
                </div>
                <div class="contact_email">
                    <label class="user_email_label">*Email</label>
                    <input type="email" class="user_email" name="user_email" required/>
                </div>
                <div class="contact_message">
                    <label class="user_message_label">Message</label>
                    <input type="text" class="user_message" name="user_message" required/>
                </div>
                <button class="contact_btn">Submit</button>
            </form>
        </div>
        <script src="JS/contact.js"></script>
    </body>
</html>
